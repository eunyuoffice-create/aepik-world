<head>

    body { background: #f3f4f6; display: flex; justify-content: center; }

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState } = React;

// ─── 컬러 토큰 ──────────────────────────────────
const C = {
  brand: "#3B82F6",
  brandLight: "#DBEAFE",
  brandDark: "#2563EB",
  white: "#FFFFFF",
  g50: "#F9FAFB",
  g100: "#F3F4F6",
  g200: "#E5E7EB",
  g400: "#9CA3AF",
  g600: "#4B5563",
  g900: "#111827",
  success: "#10B981",
  warning: "#F59E0B",
  info: "#3B82F6",
  error: "#EF4444",
  anime: "#8B5CF6",  // 애니/만화/소설
  idol: "#EC4899",   // 아이돌/아티스트
  actor: "#F59E0B",  // 배우/무대
  game: "#06B6D4",   // 게임 (프로게이머 포함)
};

const TAG_STYLES = {
  교환: { bg: "#FFF7ED", color: "#EA580C" },
  공구: { bg: "#EFF6FF", color: "#2563EB" },
  일반공구: { bg: "#FFF7ED", color: "#EA580C" },
  구함: { bg: "#F0FDF4", color: "#16A34A" },
  세트공구: { bg: "#FAF5FF", color: "#7C3AED" },
  "애니/만화/소설": { bg: "#F5F3FF", color: C.anime },
  "아이돌/아티스트": { bg: "#FDF2F8", color: C.idol },
  "배우/무대": { bg: "#FFFBEB", color: C.actor },
  게임: { bg: "#ECFEFF", color: C.game },
};

// ─── 공통 컴포넌트 ──────────────────────────────
const Tag = ({ label }) => {
  const s = TAG_STYLES[label] || { bg: C.g100, color: C.g600 };
  return (
    <span
      style={{
        display: "inline-block",
        padding: "2px 8px",
        borderRadius: 999,
        fontSize: 11,
        fontWeight: 600,
        backgroundColor: s.bg,
        color: s.color,
        marginRight: 4,
      }}
    >
      {label}
    </span>
  );
};

const StarRating = ({ rating }) => {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  return (
    <span style={{ fontSize: 11, color: C.warning }}>
      {"★".repeat(full)}
      {half ? "☆" : ""}
      <span style={{ color: C.g400, marginLeft: 2 }}>{rating}</span>
    </span>
  );
};

const TrustBadge = ({ level }) => {
  const badges = {
    1: { icon: "🌱", label: "새싹" },
    2: { icon: "⭐", label: "일반" },
    3: { icon: "💎", label: "우수" },
    4: { icon: "👑", label: "VIP" },
  };
  const b = badges[level] || badges[1];
  return (
    <span style={{ fontSize: 11, color: C.g600 }}>
      {b.icon} Lv.{level}
    </span>
  );
};

// ─── 상품 카드 ───────────────────────────────────
const ProductCard = ({ item, onClick }) => {
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onClick={() => onClick?.(item)}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: C.white,
        borderRadius: 12,
        border: `1px solid ${C.g200}`,
        overflow: "hidden",
        cursor: "pointer",
        transition: "all 200ms ease-out",
        transform: hovered ? "translateY(-2px)" : "none",
        boxShadow: hovered
          ? "0 4px 12px rgba(0,0,0,0.1)"
          : "0 1px 3px rgba(0,0,0,0.05)",
      }}
    >
      <div
        style={{
          width: "100%",
          aspectRatio: "1",
          background: `linear-gradient(135deg, ${C.g100}, ${C.g200})`,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: 36,
        }}
      >
        {item.emoji}
      </div>
      <div style={{ padding: "10px 12px 12px" }}>
        <div style={{ marginBottom: 6 }}>
          <Tag label={item.type} />
          <Tag label={item.category} />
        </div>
        <div
          style={{
            fontSize: 14,
            fontWeight: 600,
            color: C.g900,
            lineHeight: 1.4,
            marginBottom: 2,
            overflow: "hidden",
            textOverflow: "ellipsis",
            display: "-webkit-box",
            WebkitLineClamp: 2,
            WebkitBoxOrient: "vertical",
          }}
        >
          {item.title}
        </div>
        <div style={{ fontSize: 12, color: C.g400, marginBottom: 6 }}>
          {item.series} · {item.character}
        </div>
        <div
          style={{
            borderTop: `1px solid ${C.g100}`,
            paddingTop: 6,
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
          }}
        >
          <StarRating rating={item.rating} />
          <span style={{ fontSize: 11, color: C.g400 }}>
            거래 {item.trades}회
          </span>
        </div>
      </div>
    </div>
  );
};

// ─── 구함글 카드 ─────────────────────────────────

  return (

        background: "rgba(0,0,0,0.5)",

        alignItems: "flex-end",
        justifyContent: "center",
        zIndex: 100,
      }}
      onClick={onClose}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{

          maxWidth: 420,
          background: C.white,
          borderRadius: "16px 16px 0 0",
          maxHeight: "85vh",
          overflow: "auto",

      >
        <div
          style={{
            padding: "16px 20px",
            borderBottom: `1px solid ${C.g100}`,
            display: "flex",

            justifyContent: "space-between",

          <span style={{ fontSize: 16, fontWeight: 700, color: C.g900 }}>
            교환 상세

              border: "none",
              background: "none",
              fontSize: 20,
              color: C.g400,
              cursor: "pointer",
            }}

        </div>

          <div

                  {v}

            ))}
          </div>

          <div
            style={{

              alignItems: "center",
              gap: 12,
              padding: 16,
              background: C.g50,
              borderRadius: 12,
              marginBottom: 20,
            }}
          >
            <div
              style={{
                width: 44,

                  fontWeight: 600,

                }}

                확인

            </div>

        </div>
      </div>
    </div>
  );
};
