<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>애픽 월드 메인 목업</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f3f4f6; display: flex; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState } = React;

// ─── 컬러 토큰 ──────────────────────────────────
const C = {
  coral: "#3B82F6",
  coralLight: "#FFE8E8",
  coralDark: "#E85555",
  white: "#FFFFFF",
  g50: "#F9FAFB",
  g100: "#F3F4F6",
  g200: "#E5E7EB",
  g400: "#9CA3AF",
  g600: "#4B5563",
  g900: "#111827",
  success: "#10B981",
  warning: "#F59E0B",
  info: "#3B82F6",
  error: "#EF4444",
  anime: "#8B5CF6",
  idol: "#EC4899",
  actor: "#F59E0B",
  game: "#06B6D4",
};

const TAG_STYLES = {
  교환: { bg: "#FFF7ED", color: "#EA580C" },
  공구: { bg: "#EFF6FF", color: "#2563EB" },
  구함: { bg: "#F0FDF4", color: "#16A34A" },
  세트공구: { bg: "#FAF5FF", color: "#7C3AED" },
  "애니/만화/소설": { bg: "#F5F3FF", color: C.anime },
  "아이돌/아티스트": { bg: "#FDF2F8", color: C.idol },
  "배우/무대": { bg: "#FFFBEB", color: C.actor },
  게임: { bg: "#ECFEFF", color: C.game },
};

const Tag = ({ label }) => {
  const s = TAG_STYLES[label] || { bg: C.g100, color: C.g600 };
  return (
    <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 999, fontSize: 11, fontWeight: 600, backgroundColor: s.bg, color: s.color, marginRight: 4 }}>
      {label}
    </span>
  );
};

const StarRating = ({ rating }) => {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  return (
    <span style={{ fontSize: 11, color: C.warning }}>
      {"★".repeat(full)}{half ? "☆" : ""}
      <span style={{ color: C.g400, marginLeft: 2 }}>{rating}</span>
    </span>
  );
};

const TrustBadge = ({ level }) => {
  const badges = { 1: { icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>", label: "새싹" }, 2: { icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>", label: "일반" }, 3: { icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>", label: "우수" }, 4: { icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>", label: "VIP" } };
  const b = badges[level] || badges[1];
  return <span style={{ fontSize: 11, color: C.g600 }}>{b.icon} Lv.{level}</span>;
};

const ProductCard = ({ item, onClick }) => {
  const [hovered, setHovered] = useState(false);
  return (
    <div onClick={() => onClick?.(item)} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{ background: C.white, borderRadius: 12, border: `1px solid ${C.g200}`, overflow: "hidden", cursor: "pointer", transition: "all 200ms ease-out", transform: hovered ? "translateY(-2px)" : "none", boxShadow: hovered ? "0 4px 12px rgba(0,0,0,0.1)" : "0 1px 3px rgba(0,0,0,0.05)" }}>
      <div style={{ width: "100%", aspectRatio: "1", background: `linear-gradient(135deg, ${C.g100}, ${C.g200})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36 }}>{item.emoji}</div>
      <div style={{ padding: "10px 12px 12px" }}>
        <div style={{ marginBottom: 6 }}><Tag label={item.type} /><Tag label={item.category} /></div>
        <div style={{ fontSize: 14, fontWeight: 600, color: C.g900, lineHeight: 1.4, marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{item.title}</div>
        <div style={{ fontSize: 12, color: C.g400, marginBottom: 6 }}>{item.series} · {item.character}</div>
        <div style={{ borderTop: `1px solid ${C.g100}`, paddingTop: 6, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <StarRating rating={item.rating} />
          <span style={{ fontSize: 11, color: C.g400 }}>거래 {item.trades}회</span>
        </div>
      </div>
    </div>
  );
};

const EventMiniCard = ({ event }) => (
  <div style={{ minWidth: 200, background: C.white, borderRadius: 12, border: `1px solid ${C.g200}`, padding: 12, flexShrink: 0 }}>
    <div style={{ fontSize: 11, color: C.g400, marginBottom: 4 }}>{event.date}</div>
    <div style={{ fontSize: 13, fontWeight: 600, color: C.g900, marginBottom: 4 }}>{event.icon} {event.title}</div>
    <div style={{ fontSize: 12, color: C.g600 }}><svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg> {event.location}</div>
    <div style={{ marginTop: 6 }}><Tag label={event.category} /></div>
  </div>
);

const WantedCard = ({ item }) => (
  <div style={{ background: C.white, borderRadius: 12, border: `1px solid ${C.g200}`, padding: "12px 16px", marginBottom: 8 }}>
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
      <Tag label="구함" />
      <span style={{ fontSize: 13, fontWeight: 600, color: C.g900 }}>{item.title}</span>
    </div>
    <div style={{ fontSize: 12, color: C.g400 }}>{item.user} · {item.time}</div>
  </div>
);

const BannerCarousel = () => {
  const [idx, setIdx] = useState(0);
  const banners = [
    { title: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1"/><path d="M2 21h20"/><path d="M7 8v2"/><path d="M12 8v2"/><path d="M17 8v2"/><path d="M7 4h.01"/><path d="M12 4h.01"/><path d="M17 4h.01"/></svg> 히나타 쇼요 생일 축하!", sub: "6.21 Happy Birthday", gradient: "linear-gradient(135deg, #FF9A8B 0%, #3B82F6 50%, #FF8E53 100%)" },
    { title: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> 뉴진스 데뷔 기념", sub: "7.22 Debut Anniversary", gradient: "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)" },
    { title: "⚔️ 원신 4주년 축하", sub: "9.28 Anniversary", gradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)" },
  ];
  const b = banners[idx];
  return (
    <div style={{ position: "relative" }}>
      <div style={{ background: b.gradient, borderRadius: 16, padding: "28px 24px", color: C.white, minHeight: 120, display: "flex", flexDirection: "column", justifyContent: "center", transition: "background 500ms ease" }}>
        <div style={{ fontSize: 12, opacity: 0.9, marginBottom: 4 }}>팬 메이드 축하 배너</div>
        <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 4 }}>{b.title}</div>
        <div style={{ fontSize: 14, opacity: 0.85 }}>{b.sub}</div>
      </div>
      <div style={{ display: "flex", justifyContent: "center", gap: 6, marginTop: 10 }}>
        {banners.map((_, i) => (
          <button key={i} onClick={() => setIdx(i)} style={{ width: i === idx ? 20 : 8, height: 8, borderRadius: 999, border: "none", background: i === idx ? C.coral : C.g200, cursor: "pointer", transition: "all 200ms ease" }} />
        ))}
      </div>
    </div>
  );
};

const GroupBuyCard = ({ item }) => {
  const pct = Math.round((item.current / item.goal) * 100);
  return (
    <div style={{ minWidth: 220, background: C.white, borderRadius: 12, border: `1px solid ${C.g200}`, overflow: "hidden", flexShrink: 0 }}>
      <div style={{ height: 100, background: `linear-gradient(135deg, ${C.g100}, ${C.g200})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32 }}>{item.emoji}</div>
      <div style={{ padding: 12 }}>
        <div style={{ marginBottom: 6 }}><Tag label={item.type === "세트" ? "세트공구" : "공구"} /></div>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.g900, marginBottom: 4 }}>{item.title}</div>
        <div style={{ fontSize: 12, color: C.g400, marginBottom: 8 }}>{item.current}/{item.goal}명 · 마감 D-{item.dday}</div>
        <div style={{ height: 6, background: C.g100, borderRadius: 999, overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, height: "100%", background: pct >= 80 ? C.success : C.coral, borderRadius: 999, transition: "width 500ms ease" }} />
        </div>
        <div style={{ fontSize: 11, color: pct >= 80 ? C.success : C.g400, textAlign: "right", marginTop: 4 }}>{pct}%</div>
      </div>
    </div>
  );
};

const BottomNav = ({ active, onNav }) => {
  const items = [
    { key: "home", icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>", label: "홈" },
    { key: "exchange", icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>", label: "교환" },
    { key: "events", icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>", label: "이벤트" },
    { key: "chat", icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>", label: "채팅" },
    { key: "my", icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>", label: "마이" },
  ];
  return (
    <nav style={{ display: "flex", borderTop: `1px solid ${C.g200}`, background: C.white, position: "sticky", bottom: 0 }}>
      {items.map((it) => (
        <button key={it.key} onClick={() => onNav(it.key)} style={{ flex: 1, padding: "8px 0 6px", border: "none", background: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
          <span style={{ fontSize: 20 }}>{it.icon}</span>
          <span style={{ fontSize: 10, fontWeight: 600, color: active === it.key ? C.coral : C.g400 }}>{it.label}</span>
        </button>
      ))}
    </nav>
  );
};

const SectionHeader = ({ icon, title, onMore }) => (
  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
    <div style={{ fontSize: 16, fontWeight: 700, color: C.g900 }}>{icon} {title}</div>
    {onMore && <button onClick={onMore} style={{ border: "none", background: "none", fontSize: 13, color: C.g400, cursor: "pointer" }}>더보기 &gt;</button>}
  </div>
);

const MatchModal = ({ item, onClose }) => {
  const [step, setStep] = useState(0);
  if (!item) return null;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 420, background: C.white, borderRadius: "16px 16px 0 0", maxHeight: "85vh", overflow: "auto" }}>
        <div style={{ padding: "16px 20px", borderBottom: `1px solid ${C.g100}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 16, fontWeight: 700, color: C.g900 }}>교환 상세</span>
          <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 20, color: C.g400, cursor: "pointer" }}>✕</button>
        </div>
        <div style={{ padding: 20 }}>
          <div style={{ width: "100%", aspectRatio: "16/9", background: `linear-gradient(135deg, ${C.g100}, ${C.g200})`, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 48, marginBottom: 16 }}>{item.emoji}</div>
          <div style={{ marginBottom: 12 }}><Tag label={item.type} /><Tag label={item.category} /></div>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: C.g900, margin: "0 0 4px" }}>{item.title}</h2>
          <div style={{ fontSize: 13, color: C.g400, marginBottom: 16 }}>{item.series} · {item.character}</div>
          <div style={{ background: C.g50, borderRadius: 12, padding: 16, marginBottom: 16 }}>
            {[["상태", "S급 (미개봉)"], ["희망 교환", "동일 작품 다른 캐릭터"], ["차액", "±3,000원 가능"], ["거래 방식", "택배 / 직거래 가능"]].map(([k, v], i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: i < 3 ? `1px solid ${C.g200}` : "none" }}>
                <span style={{ fontSize: 13, color: C.g400 }}>{k}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.g900 }}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, padding: 16, background: C.g50, borderRadius: 12, marginBottom: 20 }}>
            <div style={{ width: 44, height: 44, borderRadius: "50%", background: C.coralLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}><svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.g900, display: "flex", alignItems: "center", gap: 6 }}>
                {item.seller || "덕후닉네임"}<TrustBadge level={item.trustLevel || 3} />
              </div>
              <div style={{ fontSize: 12, color: C.g400, display: "flex", alignItems: "center", gap: 8, marginTop: 2 }}>
                <StarRating rating={item.rating} /><span>· 거래 {item.trades}회</span>
              </div>
            </div>
          </div>
          {step === 0 ? (
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={onClose} style={{ flex: 1, padding: "14px 0", border: `1.5px solid ${C.coral}`, borderRadius: 10, background: C.white, color: C.coral, fontSize: 15, fontWeight: 700, cursor: "pointer" }}><svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 채팅</button>
              <button onClick={() => setStep(1)} style={{ flex: 1, padding: "14px 0", border: "none", borderRadius: 10, background: C.coral, color: C.white, fontSize: 15, fontWeight: 700, cursor: "pointer" }}><svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> 교환 제안</button>
            </div>
          ) : (
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}><svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.g900, marginBottom: 4 }}>교환 제안이 전송되었습니다!</div>
              <div style={{ fontSize: 13, color: C.g400, marginBottom: 16 }}>상대방이 수락하면 채팅이 시작됩니다</div>
              <button onClick={onClose} style={{ width: "100%", padding: "14px 0", border: "none", borderRadius: 10, background: C.g100, color: C.g600, fontSize: 15, fontWeight: 600, cursor: "pointer" }}>확인</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const EventCalendarPage = ({ onBack }) => {
  const [view, setView] = useState("calendar");
  const [selectedDay, setSelectedDay] = useState(6);
  const days = Array.from({ length: 31 }, (_, i) => i + 1);
  const eventDays = [3, 6, 9, 14, 17, 21, 25, 28];
  const dayEvents = [
    { icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1"/><path d="M2 21h20"/><path d="M7 8v2"/><path d="M12 8v2"/><path d="M17 8v2"/><path d="M7 4h.01"/><path d="M12 4h.01"/><path d="M17 4h.01"/></svg>", title: "히나타 쇼요 생일카페", location: "서울 홍대", period: "3/6 ~ 3/10", tags: ["애니/만화/소설"] },
    { icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="16" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><path d="m8 19-2 3"/><path d="m18 22-2-3"/></svg>", title: "뉴진스 하니 지하철 광고", location: "강남역 2호선", period: "3/1 ~ 3/15", tags: ["아이돌/아티스트"] },
    { icon: "<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 2 5 5 5-5"/><path d="M2 7h20"/><rect x="2" y="7" width="20" height="15" rx="2"/></svg>", title: "원신 4주년 팬 상영회", location: "서울 CGV 용산", period: "3/6", tags: ["게임"] },
  ];

            <SectionHeader icon="<svg style="display:inline;vertical-align:middle;width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>" title="구함글 모아보기" onMore={() => {}} />
            {MOCK_WANTED.map((w, i) => <WantedCard key={i} item={w} />)}
          </section>
        </div>
      </div>
      <BottomNav active={activeNav} onNav={handleNav} />
      <MatchModal item={selectedItem} onClose={() => setSelectedItem(null)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Aepik WorldApp />);
  </script>
</body>
